<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Subtle Volumetric Glow for the Dusty Coal Background -->
    <radialGradient id="bgGlow" cx="50%" cy="100%" r="100%">
      <stop offset="0%" stop-color="#2A2A2A" />
      <stop offset="100%" stop-color="#222222" />
    </radialGradient>

    <!-- Deep Shadow to separate the mascot from the background -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000" flood-opacity="0.5" />
    </filter>

    <!-- Squircle Clip Path to keep everything perfectly contained within the app icon shape -->
    <clipPath id="squircle">
      <rect width="512" height="512" rx="112" />
    </clipPath>
  </defs>

  <!-- Main Icon Group -->
  <g clip-path="url(#squircle)">
    
    <!-- Premium Dusty Coal Background -->
    <rect width="512" height="512" fill="url(#bgGlow)" />

    <!-- Slight tilt for mascot group -->
    <g transform="rotate(-45 256 360)">

    <!-- Peeking Choncc Silhouette (Matcha Mist) -->
    <g filter="url(#dropShadow)" fill="#C2D8C4">
      
      <!-- Left Horn (Curved inward slightly) -->
      <path d="M 100 320 Q 110 180 160 190 Q 180 240 180 280 Z" />
      
      <!-- Right Horn (Curved inward slightly) -->
      <path d="M 412 320 Q 402 180 352 190 Q 332 240 332 280 Z" />
      
      <!-- Main Peeking Dome -->
      <!-- Positioned low on the Y-axis to perfectly match the Tarsi reference -->
      <ellipse cx="256" cy="500" rx="260" ry="220" />
      
    </g>

    <!-- Facial Features (Recessed in Dusty Coal) -->
    
    <!-- Happy Squinting Eyes (^ ^) -->
    <!-- Using thick, rounded strokes for a friendly, minimalist aesthetic -->
    <path d="M 130 360 Q 170 320 210 360" fill="none" stroke="#222222" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 302 360 Q 342 320 382 360" fill="none" stroke="#222222" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" />

    </g>

  </g>

  <!-- Premium Outer Glass Border / Bevel -->
  <rect x="4" y="4" width="504" height="504" rx="108" fill="none" stroke="#C2D8C4" stroke-opacity="0.15" stroke-width="8" />
  <rect x="8" y="8" width="496" height="496" rx="104" fill="none" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="2" />
</svg>
